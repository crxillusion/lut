[build]
  command = "npm ci && npm run build"
  publish = "out"

# Production deploys should use no basePath (root domain).
[build.environment]
  NEXT_PUBLIC_BASE_PATH = ""
  # Public asset host
  NEXT_PUBLIC_ASSET_PREFIX = "https://assets.lutstudios.com"

# Optional: ensure Netlify uses the Next.js export output
# and doesn't try to run a Next.js server.
